<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合同卫士 · AI 合同风险扫描</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1a1a28;
      --surface3: #222233;
      --border: rgba(255,255,255,.06);
      --border-glow: rgba(255,255,255,.1);
      --text: #f0f0f5;
      --text2: #8888a0;
      --text3: #555570;
      --accent: #7c5cfc;
      --accent2: #a78bfa;
      --green: #34d399;
      --orange: #fbbf24;
      --red: #f87171;
      --gradient-1: linear-gradient(135deg, #7c5cfc 0%, #4f46e5 50%, #2563eb 100%);
      --gradient-2: linear-gradient(135deg, #34d399 0%, #059669 100%);
      --gradient-3: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
      --radius: 24px;
      --radius-sm: 16px;
      --radius-xs: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    ::selection { background: rgba(124,92,252,.4); color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      letter-spacing: -.01em;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,92,252,.08), transparent),
        radial-gradient(ellipse 60% 40% at 100% 80%, rgba(52,211,153,.04), transparent);
      background-attachment: fixed;
    }
    .app { max-width: 800px; margin: 0 auto; padding: 72px 24px 120px; }

    .app-header { text-align: center; margin-bottom: 64px; }
    .app-header .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 42px; font-weight: 700; letter-spacing: -.03em;
      background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .app-header p { font-size: 18px; color: var(--text2); letter-spacing: -.01em; font-weight: 400; }

    /* Card */
    .card {
      background: var(--surface); border-radius: var(--radius); padding: 36px;
      margin-bottom: 20px; border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 4px 16px rgba(0,0,0,.1);
      transition: border-color .3s, box-shadow .3s;
    }
    .card:hover { border-color: var(--border-glow); box-shadow: 0 2px 4px rgba(0,0,0,.3), 0 8px 32px rgba(0,0,0,.15); }

    .divider-text {
      text-align: center; font-size: 12px; color: var(--text3); margin: 48px 0 24px;
      letter-spacing: .1em; text-transform: uppercase; font-weight: 500;
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px;
      border-radius: 12px; font-size: 14px; font-weight: 500; letter-spacing: -.01em;
      border: 1px solid var(--border); cursor: pointer; transition: all .2s;
      text-decoration: none; background: var(--surface2); color: var(--text);
    }
    .btn:hover { background: var(--surface3); border-color: var(--border-glow); transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #8b6cf6; box-shadow: 0 4px 20px rgba(124,92,252,.3); }
    .btn-success { background: var(--green); color: #000; border-color: transparent; font-weight: 600; }
    .btn-success:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(52,211,153,.3); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 8px; letter-spacing: 0;
    }
    .badge-high { background: rgba(248,113,113,.12); color: var(--red); }
    .badge-medium { background: rgba(251,191,36,.12); color: var(--orange); }
    .badge-low { background: rgba(52,211,153,.12); color: var(--green); }

    /* Risk card */
    .risk-card {
      background: var(--surface2); border-radius: var(--radius-xs); padding: 24px;
      margin-bottom: 12px; border: 1px solid var(--border);
      transition: all .25s; position: relative; overflow: hidden;
    }
    .risk-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    }
    .risk-card.high::before { background: var(--gradient-3); }
    .risk-card.medium::before { background: linear-gradient(180deg, #fbbf24, #d97706); }
    .risk-card.low::before { background: var(--gradient-2); }
    .risk-card:hover { border-color: var(--border-glow); transform: translateX(4px); }
    .risk-card blockquote {
      background: rgba(0,0,0,.2); border-left: 2px solid rgba(255,255,255,.06);
      padding: 12px 16px; margin: 14px 0; font-size: 15px; color: var(--text2);
      border-radius: 0 8px 8px 0; font-style: normal;
    }

    .spinner {
      width: 36px; height: 36px; border: 2px solid var(--surface3);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .6s cubic-bezier(.6,.1,.4,.9) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px) scale(.98); }
      to { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .fade-up { animation: fadeUp .5s cubic-bezier(.16,1,.3,1); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
